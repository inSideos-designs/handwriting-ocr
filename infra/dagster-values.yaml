dagster-user-deployments:
  enabled: true
  deployments:
    - name: handwriting-ocr
      image:
        repository: us-central1-docker.pkg.dev/doc-processing-hw-ocr/handwriting-ocr/dagster
        tag: latest
        pullPolicy: Always
      dagsterApiGrpcArgs:
        - "-m"
        - "orchestration.definitions"
      port: 3030
      envSecrets: []
      envConfigMaps: []
      env:
        GCS_BUCKET: "gs://doc-processing-hw-ocr-ml"
        BATCH_SIZE: "64"
        LEARNING_RATE: "0.001"
        NUM_EPOCHS: "50"
        CHECKPOINT_DIR: "/tmp/checkpoints"
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"

dagsterWebserver:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: LoadBalancer
    port: 3001

dagsterDaemon:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

runLauncher:
  type: K8sRunLauncher
  config:
    k8sRunLauncher:
      envVars:
        - GCS_BUCKET=gs://doc-processing-hw-ocr-ml
        - BATCH_SIZE=64
        - LEARNING_RATE=0.001
        - NUM_EPOCHS=50
        - CHECKPOINT_DIR=/tmp/checkpoints
      image:
        repository: "us-central1-docker.pkg.dev/doc-processing-hw-ocr/handwriting-ocr/dagster"
        tag: "latest"
        pullPolicy: Always
      imagePullPolicy: Always

postgresql:
  enabled: true
  postgresqlPassword: dagster
  persistence:
    size: 2Gi

ingress:
  enabled: false
